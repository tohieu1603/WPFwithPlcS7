# Dedicated PostgreSQL for the VisionHmi desktop app (auth / users).
# Separate from the MES database: own container, own volume, host port 5433.
services:
  db:
    image: postgres:17-alpine
    container_name: visionhmi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hmi
      POSTGRES_PASSWORD: hmi
      POSTGRES_DB: visionhmi
    ports:
      - "5433:5432"
    volumes:
      - visionhmi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmi -d visionhmi"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  visionhmi-pgdata:
