# PostgreSQL only - the MES backend runs on the host (npm start) and connects here.
services:
  db:
    image: postgres:17-alpine
    container_name: mes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mes
      POSTGRES_PASSWORD: mes
      POSTGRES_DB: mes
    ports:
      - "5432:5432"
    volumes:
      - mes-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes -d mes"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mes-pgdata:
